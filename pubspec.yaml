name: billetudo
description: Billetudo — app de finanzas personales local-first (Flutter) para el mercado hispanohablante.
publish_to: 'none'
version: 0.1.0+1

# NOTA: las versiones son indicativas. Ajusta con:
#   flutter pub get   /   flutter pub upgrade --major-versions
environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # --- Estado (decisión: bloc/cubit) ---
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # --- Inyección de dependencias (get_it + injectable codegen) ---
  get_it: ^7.7.0
  injectable: ^2.4.4

  # --- Navegación ---
  go_router: ^14.2.7

  # --- Programación funcional (Either<Failure,T> en la capa domain) ---
  fpdart: ^1.1.0

  # --- Crash reporting (detrás de interfaz CrashReporter; DSN por dart-define) ---
  # 9.x, no 8.x: la 8.x compila con una language version de Kotlin que choca
  # con Kotlin 2.2.20 (fijado en android/settings.gradle.kts) — "Language
  # version 1.6 is no longer supported", bloquea cualquier build Android.
  sentry_flutter: ^9.24.0

  # --- Almacenamiento seguro (número de cuenta cifrado, Keychain/Keystore) ---
  flutter_secure_storage: ^10.3.1

  # --- Base de datos local (offline-first, fuente de verdad) ---
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.4.0

  # --- Sync + backend (decisión: PowerSync + Supabase) ---
  powersync: ^1.9.0
  supabase_flutter: ^2.5.6

  # --- Gráficas ---
  fl_chart: ^0.68.0

  # --- Tipografía (Plus Jakarta Sans, ver design-system MASTER.md) ---
  # Empaquetada en assets/fonts/ (pesos 400/500/600/700/800, OFL). google_fonts
  # la toma del bundle en vez de la red — necesario para uso offline y para que
  # los golden tests rendericen la tipografía real, no el fallback del sistema.
  google_fonts: ^6.2.1

  # --- Monetización (rewarded ads + suscripciones) ---
  # Comentadas a propósito: se agregan en el mismo cambio que implementa su
  # feature, no antes. Aunque no las use ningún código, sus plugins inyectan
  # permisos y frameworks en el build fusionado que las tiendas detectan y
  # preguntan (BILLING de Play Billing, AD_ID de AdMob). google_mobile_ads
  # además exige un App ID (com.google.android.gms.ads.APPLICATION_ID /
  # GADApplicationIdentifier) sin el cual el SDK crashea al inicializar.
  # Si purchases_flutter vuelve, debe ser 10.x+: la 6.x fija
  # freezed_annotation ^2 y bloquea custom_lint.
  #google_mobile_ads: ^5.1.0
  #purchases_flutter: ^10.4.1

  # --- Captura sin fricción ---
  # Igual: enlazan frameworks nativos y arrastran declaraciones de privacidad
  # (micrófono, cámara) que todavía no hay qué justificar.
  #speech_to_text: ^6.6.2
  #google_mlkit_text_recognition: ^0.13.0

  # --- Utilidades ---
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Reglas propias del proyecto (ver docs/convenciones-de-codigo.md).
  # `dart run custom_lint` las corre en CI; el IDE las muestra en vivo.
  custom_lint: ^0.8.1
  billetudo_lints:
    path: tools/billetudo_lints

  # Codegen de Drift + injectable
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.2

  # Testing (piramide: unit + cubit + mocks + e2e)
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  # e2e. Versión acoplada al CLI: `dart pub global activate patrol_cli 4.5.1`
  # (patrol 4.7.x exige patrol_cli >=4.5.0 — un desajuste entre ambos falla en
  # runtime, no en tiempo de análisis). Requiere setup nativo tras `flutter create .`.
  patrol: ^4.7.1
  integration_test:
    sdk: flutter

# Patrol e2e: tests live in integration_test/ (not the default patrol_test/),
# so this project's other integration_test/ conventions (Flutter's own runner)
# keep working unmodified.
patrol:
  app_name: Billetudo
  test_directory: integration_test
  android:
    package_name: com.camiloagudelo.billetudo
  ios:
    bundle_id: com.camiloagudelo.billetudo

flutter:
  uses-material-design: true
  generate: true # habilita l10n si usas flutter gen-l10n

  # google_fonts encuentra estos archivos escaneando `assets` (no `fonts:` —
  # así lo documenta el paquete: los nombres ya siguen la convención de la API
  # de Google Fonts, así que declararlos en `fonts:` es redundante y no se
  # debe renombrar el archivo).
  assets:
    - assets/fonts/

dependency_overrides:
  # path_provider_foundation >=2.5 migró a native assets (hook/build.dart),
  # lo que rompe la compilación del build script de build_runner en este SDK.
  # Fijar a la última versión pre-hooks hasta que build_runner soporte hooks.
  path_provider_foundation: 2.4.2
