name: billetudo
description: Billetudo — app de finanzas personales local-first (Flutter) para el mercado hispanohablante.
publish_to: 'none'
version: 0.0.1+1

# NOTA: las versiones son indicativas. Ajusta con:
#   flutter pub get   /   flutter pub upgrade --major-versions
environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # --- Estado (decisión: bloc/cubit) ---
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # --- Inyección de dependencias (get_it + injectable codegen) ---
  get_it: ^7.7.0
  injectable: ^2.4.4

  # --- Navegación ---
  go_router: ^14.2.7

  # --- Programación funcional (Either<Failure,T> en la capa domain) ---
  fpdart: ^1.1.0

  # --- Crash reporting (detrás de interfaz CrashReporter; DSN por dart-define) ---
  # 9.x, no 8.x: la 8.x compila con una language version de Kotlin que choca
  # con Kotlin 2.2.20 (fijado en android/settings.gradle.kts) — "Language
  # version 1.6 is no longer supported", bloquea cualquier build Android.
  sentry_flutter: ^9.24.0

  # --- Almacenamiento seguro (número de cuenta cifrado, Keychain/Keystore) ---
  flutter_secure_storage: ^10.3.1

  # --- Base de datos local (offline-first, fuente de verdad) ---
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.4.0

  # --- Sync + backend (decisión: PowerSync + Supabase) ---
  # Drift abre su conexión sobre el `sqlite_async` que administra PowerSync
  # (decisión #6, docs/requirements/05-auth-sync.md) — drift_sqlite_async
  # fijado en versión exacta (pre-1.0, riesgo de breaking changes entre
  # minors, ver el mismo doc).
  powersync: ^2.3.1
  drift_sqlite_async: 0.3.1
  supabase_flutter: ^2.5.6

  # --- Gráficas ---
  fl_chart: ^0.68.0

  # --- Tipografía (Plus Jakarta Sans, ver design-system MASTER.md) ---
  # Empaquetada en assets/fonts/ (pesos 400/500/600/700/800, OFL) y declarada
  # como familia real en la sección `flutter: fonts:` de abajo — la app NO usa
  # `google_fonts` para tipografía (ver el comentario ahí: rompía los pesos).
  # El paquete se conserva solo porque los golden tests siguen llamando a
  # `GoogleFonts.config.allowRuntimeFetching = false` como red de seguridad
  # contra descargas de red en `flutter test`.
  google_fonts: ^6.2.1

  # --- Monetización (rewarded ads + suscripciones) ---
  # Comentadas a propósito: se agregan en el mismo cambio que implementa su
  # feature, no antes. Aunque no las use ningún código, sus plugins inyectan
  # permisos y frameworks en el build fusionado que las tiendas detectan y
  # preguntan (BILLING de Play Billing, AD_ID de AdMob). google_mobile_ads
  # además exige un App ID (com.google.android.gms.ads.APPLICATION_ID /
  # GADApplicationIdentifier) sin el cual el SDK crashea al inicializar.
  # Si purchases_flutter vuelve, debe ser 10.x+: la 6.x fija
  # freezed_annotation ^2, más vieja que lo que el resto del proyecto usa.
  #google_mobile_ads: ^5.1.0
  #purchases_flutter: ^10.4.1

  # --- Captura sin fricción ---
  # Igual: enlazan frameworks nativos y arrastran declaraciones de privacidad
  # (micrófono, cámara) que todavía no hay qué justificar.
  #speech_to_text: ^6.6.2
  #google_mlkit_text_recognition: ^0.13.0

  # --- Utilidades ---
  intl: ^0.20.2

  # --- Cripto (nonce hasheado del sign-in nativo con Google, ver
  # google_auth_datasource.dart) ---
  crypto: ^3.0.7

  # --- Auth social (decisión: solo Google/Apple, nunca email+contraseña) ---
  # Android: solo Google. iOS: Google + Sign in with Apple (guideline 4.8).
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # --- Iconografía (decisión: Lucide, trazo fino/geométrico, ver MASTER.md) ---
  # El .pen y la BD de categorías ya guardan nombres de icono estilo Lucide
  # (`utensils`, `heart-pulse`, ...); este paquete es lo que los renderiza en
  # vez de caer a Material Icons genéricos.
  lucide_icons_flutter: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen de Drift + injectable
  # Fijado (no ^): 2.34.1+ sube a analyzer ^13.0.0, incompatible con el
  # `meta` 1.17.0 que fija el Flutter SDK de este entorno (ver
  # dependency_overrides → analyzer).
  drift_dev: 2.34.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.2

  # Testing (piramide: unit + cubit + mocks + e2e)
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  # `http.testing.MockClient`, injected into `SupabaseClient(httpClient: ...)`
  # to fake the `category_seeds`/`categories` REST responses in datasource
  # tests without a real network call — `PostgrestFilterBuilder` implements
  # `Future` itself, so mocktail can't stub the query-builder chain directly.
  http: ^1.6.0
  # e2e. Versión acoplada al CLI: `dart pub global activate patrol_cli 4.5.1`
  # (patrol 4.7.x exige patrol_cli >=4.5.0 — un desajuste entre ambos falla en
  # runtime, no en tiempo de análisis). Requiere setup nativo tras `flutter create .`.
  patrol: ^4.7.1
  integration_test:
    sdk: flutter
  # SharedPreferences.setMockInitialValues en di_test — transitiva vía
  # otros paquetes, pero se usa directo así que hay que declararla.
  shared_preferences: ^2.3.2

  # Genera los mipmaps de Android y el AppIcon.appiconset de iOS a partir del
  # master de assets/branding/ (ver assets/branding/MARCA.md). Solo se corre
  # a mano (`dart run flutter_launcher_icons`) cuando cambie el ícono.
  flutter_launcher_icons: ^0.14.3

# Patrol e2e: tests live in integration_test/ (not the default patrol_test/),
# so this project's other integration_test/ conventions (Flutter's own runner)
# keep working unmodified.
patrol:
  app_name: Billetudo
  test_directory: integration_test
  android:
    package_name: com.billetudo.app
  ios:
    bundle_id: com.billetudo.app

# Ícono de app (billetudo, ver assets/branding/MARCA.md). No incluye
# variantes por flavor (dev/prod) todavía — ambos flavors comparten master.
flutter_launcher_icons:
  android: 'ic_launcher'
  ios: true
  remove_alpha_ios: true # iOS no admite transparencia en el ícono
  image_path: 'assets/branding/ic_launcher_master.png' # 1024, full-bleed
  adaptive_icon_background: 'assets/branding/ic_launcher_bg.png'
  adaptive_icon_foreground: 'assets/branding/ic_launcher_fg.png'
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true # habilita l10n si usas flutter gen-l10n

  assets:
    - assets/branding/

  # Plus Jakarta Sans se declara como UNA familia con sus 5 pesos, no via
  # `google_fonts`. Motivo: `GoogleFonts.plusJakartaSansTextTheme` fija
  # `fontFamily: 'PlusJakartaSans_regular'` (una familia de un solo peso) en
  # cada estilo del text theme, asi que `copyWith(fontWeight: w700/w800)`
  # cambiaba el peso pedido sin cambiar el archivo que renderiza y todo salia
  # en 400. Con la familia declarada aqui, el motor elige el `.ttf` correcto
  # por `fontWeight` y `copyWith` vuelve a funcionar en toda la app.
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800

dependency_overrides:
  # path_provider_foundation >=2.5 migró a native assets (hook/build.dart),
  # lo que rompe la compilación del build script de build_runner en este SDK.
  # Fijar a la última versión pre-hooks hasta que build_runner soporte hooks.
  path_provider_foundation: 2.4.2

  # drift_dev >=2.32.1 (necesario para sqlite3 ^3.x, que a su vez exige
  # powersync/sqlite_async/drift_sqlite_async) requiere analyzer >=10.0.0
  # <13.0.0. Se fuerza a 10.0.1 (10.0.0 crashea con "Null check operator used
  # on a null value" en `LibraryReader._readDirectiveUri` al correr
  # build_runner sobre el SDK de Flutter de este entorno — Dart 3.10.4 — apenas
  # se agregó `powersync`/`drift_sqlite_async`; 10.0.1 es la primera versión
  # que lo arregla y sigue siendo la única compatible con el `meta` 1.17.0 que
  # fija el Flutter SDK de este entorno — 10.0.2+ ya exige `meta` ^1.18.0).
  analyzer: 10.0.1
  # dart_style (transitive, via build_runner/drift_dev) must match the
  # analyzer override above or its generated-code formatter breaks at
  # runtime (`ParserErrorCode` moved between analyzer majors).
  dart_style: 3.1.6
